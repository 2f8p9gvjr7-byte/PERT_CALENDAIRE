
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PERT Planner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

:root {
  --bg:       #0e1628;
  --surface:  #1a2540;
  --card:     #1e2d47;
  --border:   #2e3d5a;
  --accent:   #f5a623;
  --accent2:  #e05c7a;
  --accent3:  #5bc4f5;
  --text:     #e8eef5;
  --muted:    #6a7fa0;
  --critical: #e05c7a;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── BUTTONS ── */
.btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 7px 12px;
  border-radius: 7px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.btn:active { transform: scale(0.95); opacity: 0.8; }
.btn.primary { background: var(--accent); color: #0e1628; border-color: var(--accent); font-weight: 700; }
.btn.danger  { background: rgba(224,92,122,0.15); color: var(--accent2); border-color: var(--accent2); }
.btn.sm      { padding: 5px 9px; font-size: 10px; }

/* ── PROJECT SCREEN ── */
#projectScreen { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

.proj-header {
  padding: 18px 16px 14px;
  border-bottom: 2px solid var(--accent);
  background: var(--bg);
  flex-shrink: 0;
}
.proj-header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800;
  color: var(--accent); letter-spacing: -0.5px;
}
.proj-header p { font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: .1em; text-transform: uppercase; }

.proj-list { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

.proj-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.proj-card:active { transform: scale(0.98); }
.proj-card:hover { border-color: var(--accent); }
.proj-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.proj-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
.proj-meta { font-size: 10px; color: var(--muted); margin-top: 5px; }
.proj-badge {
  font-size: 9px; padding: 3px 8px; border-radius: 20px;
  background: rgba(245,166,35,0.12); color: var(--accent);
  border: 1px solid rgba(245,166,35,0.3); white-space: nowrap; flex-shrink: 0;
}
.proj-actions { display: flex; gap: 6px; margin-top: 12px; }
.color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }

.proj-new-btn {
  width: 100%; padding: 16px;
  background: transparent;
  border: 1.5px dashed var(--border);
  border-radius: 14px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 12px; cursor: pointer;
  text-align: center; transition: all 0.15s;
}
.proj-new-btn:active { border-color: var(--accent); color: var(--accent); }
.proj-new-btn:hover  { border-color: var(--accent); color: var(--accent); }

/* ── APP SCREEN ── */
#appScreen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
#appScreen.visible { display: flex; }

header {
  display: flex; align-items: center;
  padding: 10px 12px;
  border-bottom: 2px solid var(--accent);
  background: var(--bg);
  flex-shrink: 0; gap: 8px;
}
.back-btn {
  background: none; border: 1px solid var(--border);
  color: var(--accent); font-size: 16px;
  width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
}
.header-title { flex: 1; min-width: 0; }
.header-title h1 {
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
  color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-title p { font-size: 9px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
.header-actions { display: flex; gap: 5px; flex-shrink: 0; }

/* TABS */
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
.tab {
  flex: 1; padding: 10px 4px; text-align: center;
  font-size: 10px; color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.15s;
  letter-spacing: .06em; text-transform: uppercase;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.view { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.view.active { display: flex; }

/* CANVAS */
#canvas-wrap {
  flex: 1; overflow: hidden; position: relative;
  background:
    radial-gradient(circle at 15% 85%, rgba(245,166,35,0.06) 0%, transparent 50%),
    radial-gradient(circle at 85% 15%, rgba(91,196,245,0.04) 0%, transparent 50%),
    var(--bg);
}
#canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

/* NODES */
.node {
  position: absolute;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  user-select: none;
  touch-action: none;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.node.critical { border-color: var(--critical); box-shadow: 0 0 12px rgba(224,92,122,0.3); }
.node.fin-node { border-style: double; border-width: 3px; background: var(--surface); }

.node-inner { padding: 5px 7px; overflow: hidden; width: 100%; }
.node-id    { color: var(--muted); letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node-name  { font-weight: 500; color: var(--text); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node-times { display: flex; gap: 2px; white-space: nowrap; overflow: hidden; }
.node-es    { color: var(--accent); }
.node-ls    { color: var(--accent2); }
.node-dur   { color: var(--accent3); }
.node-slack { color: var(--muted); white-space: nowrap; }
.node-slack.zero { color: var(--critical); }

svg#arrows {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; overflow: visible;
}
.arrow          { fill: none; stroke: var(--border); stroke-width: 1.5; marker-end: url(#arrowhead); }
.arrow.critical { stroke: var(--critical); stroke-width: 2.5; opacity: 0.9; }

/* CANVAS CONTROLS */
.canvas-controls {
  position: absolute; bottom: 50px; right: 12px;
  display: flex; flex-direction: column; gap: 6px; z-index: 10;
}
.canvas-controls .btn { width: 38px; height: 38px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; border-radius: 50%; }

/* INFO BAR */
.info-bar {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 7px 14px; font-size: 10px; color: var(--muted);
  display: flex; justify-content: space-between; flex-shrink: 0;
  gap: 6px; overflow: hidden;
}
.info-bar span { color: var(--accent); }
.info-crit { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* CONNECT BANNER */
.connect-banner {
  display: none; background: rgba(245,166,35,0.12);
  border-bottom: 1px solid var(--accent); color: var(--accent);
  font-size: 11px; padding: 7px 14px;
  align-items: center; justify-content: center; gap: 8px; flex-shrink: 0;
}
.connect-banner.show { display: flex; }

/* FORM VIEW */
.form-view { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

.field { margin-bottom: 10px; }
.field label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
.field input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); font-family: 'DM Mono', monospace;
  font-size: 13px; padding: 9px 11px; outline: none; transition: border-color 0.15s;
}
.field input:focus { border-color: var(--accent); }

.multi-check { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.check-pill {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 10px; font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.check-pill.selected { background: rgba(245,166,35,0.18); border-color: var(--accent); color: var(--accent); }

/* TASK LIST */
.task-item {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.task-item.critical { border-left: 3px solid var(--critical); }
.task-info { flex: 1; min-width: 0; }
.task-name { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
.task-meta { font-size: 10px; color: var(--muted); }
.task-actions { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 6px; width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

/* STATS */
.stats-view { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.stat-card h3 { font-family: 'Syne', sans-serif; font-size: 11px; color: var(--muted); margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
.stat-big { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: var(--accent); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.critical-path { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.cp-node { background: rgba(224,92,122,0.15); border: 1px solid var(--critical); border-radius: 6px; padding: 4px 9px; font-size: 11px; color: var(--critical); }
.cp-arrow { color: var(--muted); font-size: 14px; display: flex; align-items: center; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 200; align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--accent);
  border-radius: 16px 16px 0 0; padding: 20px 16px 32px;
  width: 100%; max-height: 85dvh; overflow-y: auto;
}
.modal h2 { font-family: 'Syne', sans-serif; font-size: 16px; color: var(--accent); margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.modal-actions .btn { flex: 1; padding: 12px; font-size: 13px; text-align: center; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; line-height: 1.8; }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }

/* DETAIL MODAL */
.detail-title {
  font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
  color: var(--accent); margin-bottom: 4px;
}
.detail-id { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 16px; text-transform: uppercase; }
.detail-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 14px;
}
.detail-cell {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px;
}
.detail-cell.critical { border-color: var(--critical); background: rgba(224,92,122,0.08); }
.detail-cell.ok       { border-color: #27ae60;         background: rgba(39,174,96,0.08); }
.detail-label { font-size: 9px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 4px; }
.detail-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); line-height: 1; }
.detail-value.accent  { color: var(--accent); }
.detail-value.accent3 { color: var(--accent3); }
.detail-value.red     { color: var(--critical); }
.detail-value.green   { color: #27ae60; }
.detail-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }
.detail-explain {
  background: rgba(245,166,35,0.08); border: 1px solid rgba(245,166,35,0.25);
  border-radius: 10px; padding: 12px; font-size: 11px; color: var(--text);
  line-height: 1.7; margin-bottom: 12px;
}
.detail-explain b { color: var(--accent); }
.detail-preds {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px; margin-bottom: 4px;
}
.detail-preds-label { font-size: 9px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
.pred-tag {
  display: inline-block; background: var(--card);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 3px 8px; font-size: 11px; margin: 2px 3px 2px 0;
}
.detail-critical-badge {
  display: inline-block; background: rgba(224,92,122,0.15);
  border: 1px solid var(--critical); border-radius: 20px;
  padding: 4px 12px; font-size: 11px; color: var(--critical);
  font-weight: 500; margin-bottom: 14px;
}
.detail-ok-badge {
  display: inline-block; background: rgba(39,174,96,0.12);
  border: 1px solid #27ae60; border-radius: 20px;
  padding: 4px 12px; font-size: 11px; color: #27ae60;
  font-weight: 500; margin-bottom: 14px;
}
</style>
</head>
<body>

<!-- PROJECT SCREEN -->
<div id="projectScreen">
  <div class="proj-header">
    <h1>&#9672; PERT Planner</h1>
    <p>Vos projets &mdash; donn&eacute;es conserv&eacute;es localement</p>
  </div>
  <div class="proj-list" id="projList"></div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <header>
    <button class="back-btn" id="btnBack">&#8592;</button>
    <div class="header-title">
      <h1 id="headerProjName">Projet</h1>
      <p id="headerProjSub"></p>
    </div>
    <div class="header-actions">
      <button class="btn sm" id="btnSettings">⚙️</button>
      <button class="btn sm" id="btnLayout">&#8859; Auto</button>
      <button class="btn sm" id="btnConnect">&#8674; Lier</button>
      <button class="btn sm primary" id="btnAdd">＋</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" data-view="graph">Graphe</div>
    <div class="tab" data-view="tasks">T&acirc;ches</div>
    <div class="tab" data-view="stats">Analyse</div>
  </div>

  <div class="connect-banner" id="connectBanner">
    Touchez source puis cible
    <button class="btn sm" id="btnCancelConnect">&#10005;</button>
  </div>

  <!-- GRAPH VIEW -->
  <div class="view active" id="view-graph">
    <div id="canvas-wrap">
      <svg id="arrows">
        <defs>
          <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0,8 3,0 6" fill="#2e3d5a"/>
          </marker>
          <marker id="ahc" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0,8 3,0 6" fill="#e05c7a"/>
          </marker>
        </defs>
      </svg>
      <div id="canvas"></div>
      <div class="canvas-controls">
        <button class="btn" id="btnZoomIn">+</button>
        <button class="btn" id="btnZoomOut">-</button>
        <button class="btn" id="btnFit">&#8861;</button>
      </div>
    </div>
    <div class="info-bar">
      <div>T: <span id="infoCount">0</span></div>
      <div>Dur&eacute;e: <span id="infoDuration">0</span>j</div>
      <div class="info-crit">Critique: <span id="infoCritical">&mdash;</span></div>
    </div>
  </div>

  <!-- TASKS VIEW -->
  <div class="view" id="view-tasks">
    <div class="form-view" id="taskList"></div>
  </div>

  <!-- STATS VIEW -->
  <div class="view" id="view-stats">
    <div class="stats-view" id="statsContent"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="modalSettings">
  <div class="modal">
    <h2>⚙️ Paramètres du projet</h2>

    <div class="field">
      <label>Unité de temps</label>
      <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">
        <button class="btn" id="sBtnUnitMin"  onclick="setSettingsUnit('min')"  style="flex:1;">⏱ Minutes</button>
        <button class="btn" id="sBtnUnitHour" onclick="setSettingsUnit('hour')" style="flex:1;">🕐 Heures</button>
        <button class="btn" id="sBtnUnitDay"  onclick="setSettingsUnit('day')"  style="flex:1;">📅 Jours</button>
      </div>
      <div id="sUnitDesc" style="font-size:10px;color:var(--muted);margin-top:6px;"></div>
    </div>

    <div class="field" id="sCalField">
      <label>Calendrier</label>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn" id="sBtnCalAll"  onclick="setSettingsCal('all')"  style="flex:1;">📆 Tous les jours</button>
        <button class="btn" id="sBtnCalWork" onclick="setSettingsCal('work')" style="flex:1;">💼 Jours ouvrés</button>
      </div>
      <div id="sCalDesc" style="font-size:10px;color:var(--muted);margin-top:6px;"></div>
    </div>

    <div class="field">
      <label>Mode de planification</label>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn" id="sBtnModeStart" onclick="setSettingsMode('start')" style="flex:1;">📅 Date de début</button>
        <button class="btn" id="sBtnModeEnd"   onclick="setSettingsMode('end')"   style="flex:1;">🏁 Date de fin</button>
      </div>
    </div>

    <div class="field" id="sAnchorField">
      <label id="sLabelDate">HEURE DE DÉBUT</label>
      <input type="time" id="sTime" style="display:none;"/>
      <input type="date" id="sDate"/>
    </div>

    <div id="sDateResult" style="background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.25);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--text);line-height:1.8;margin-bottom:4px;display:none;"></div>

    <div class="modal-actions">
      <button class="btn" id="btnSettingsCancel">Annuler</button>
      <button class="btn primary" id="btnSettingsSave">Appliquer</button>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="modalTask">
  <div class="modal">
    <h2 id="modalTaskTitle">Nouvelle t&acirc;che</h2>
    <div class="field"><label>NOM</label><input type="text" id="fName" placeholder="ex: Conception"></div>
    <div class="field"><label id="fDurLabel">DURÉE (jours)</label><input type="number" id="fDur" placeholder="5" min="0" step="1"></div>
    <div class="field"><label>PR&Eacute;D&Eacute;CESSEURS</label><div class="multi-check" id="fPreds"></div></div>
    <div class="modal-actions">
      <button class="btn" id="btnTaskCancel">Annuler</button>
      <button class="btn primary" id="btnTaskSave">Enregistrer</button>
    </div>
  </div>
</div>

<!-- PROJECT MODAL -->
<div class="modal-overlay" id="modalProj">
  <div class="modal">
    <h2>Nouveau projet</h2>
    <div class="field"><label>NOM DU PROJET</label><input type="text" id="fProjName" placeholder="ex: Anniversaire surprise"></div>
    <div class="field"><label>DESCRIPTION (optionnel)</label><input type="text" id="fProjDesc" placeholder="ex: Fête du 13 juin"></div>
    <div class="field">
      <label>Mode de planification</label>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn" id="btnModeStart" onclick="setProjMode('start')" style="flex:1;border-color:var(--accent);color:var(--accent);">📅 Date de début</button>
        <button class="btn" id="btnModeEnd"   onclick="setProjMode('end')"   style="flex:1;">🏁 Date de fin</button>
      </div>
    </div>
    <div class="field" id="fieldProjDate">
      <label id="labelProjDate">DATE DE DÉBUT</label>
      <input type="date" id="fProjDate"/>
    </div>
    <div class="modal-actions">
      <button class="btn" id="btnProjCancel">Annuler</button>
      <button class="btn primary" id="btnProjSave">Créer</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalDetail">
  <div class="modal">
    <div id="detailContent"></div>
    <div class="modal-actions">
      <button class="btn" id="btnDetailClose">Fermer</button>
      <button class="btn primary" id="btnDetailEdit">&#9998; Modifier</button>
    </div>
  </div>
</div>

<script>
var MAX_PROJ  = 5;
var NODE_W    = 120;
var NODE_H    = 76;
var COLORS    = ['#f5a623','#5bc4f5','#27ae60','#e05c7a','#9b8fd4'];
var STORAGE_K = 'pert_v2';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_K)) || {projects:[]}; }
  catch(e) { return {projects:[]}; }
}
function saveData() { localStorage.setItem(STORAGE_K, JSON.stringify(appData)); }

var appData = loadData();
var currentProjId = null;
var tasks = [];

function currentProj() {
  return appData.projects.filter(function(p){ return p.id === currentProjId; })[0];
}
function saveTasks() {
  var p = currentProj();
  if (p) { p.tasks = tasks; p.updatedAt = Date.now(); saveData(); }
}

function calcPertOn(arr) {
  arr.forEach(function(t){ t.es=0; t.ef=0; t.ls=Infinity; t.lf=Infinity; t.slack=0; });
  var changed=true, iter=0;
  while (changed && iter++<100) {
    changed=false;
    arr.forEach(function(t){
      var es=0;
      (t.preds||[]).forEach(function(pid){
        var p=arr.filter(function(x){return x.id===pid;})[0];
        if (p) es=Math.max(es,p.ef);
      });
      var ef=es+(parseFloat(t.dur)||0);
      if (es!==t.es||ef!==t.ef){ t.es=es; t.ef=ef; changed=true; }
    });
  }
  var maxEF = arr.length ? Math.max.apply(null, arr.map(function(t){return t.ef;})) : 0;
  arr.forEach(function(t){ t.lf=maxEF; t.ls=maxEF-(parseFloat(t.dur)||0); });
  changed=true; iter=0;
  while (changed && iter++<100) {
    changed=false;
    arr.forEach(function(t){
      arr.forEach(function(s){
        if ((s.preds||[]).indexOf(t.id)>=0 && s.ls<t.lf){
          t.lf=s.ls; t.ls=t.lf-(parseFloat(t.dur)||0); changed=true;
        }
      });
    });
  }
  arr.forEach(function(t){
    t.slack=parseFloat((t.lf-t.ef).toFixed(2));
    t.critical=(t.slack===0);
  });
  var crits=arr.filter(function(t){return t.critical;}).sort(function(a,b){return a.es-b.es;});
  return {maxEF:maxEF, critTasks:crits};
}
function calcPert(){ return calcPertOn(tasks); }

var layoutData = {};

function autoLayout() {
  if (!tasks.length) return;
  var res = calcPert();
  var critSet = {};
  res.critTasks.forEach(function(t){ critSet[t.id]=true; });
  var col={};
  tasks.forEach(function(t){ col[t.id]=0; });
  var changed=true, iter=0;
  while (changed && iter++<100) {
    changed=false;
    tasks.forEach(function(t){
      (t.preds||[]).forEach(function(pid){
        if ((col[pid]||0)+1 > col[t.id]){ col[t.id]=(col[pid]||0)+1; changed=true; }
      });
    });
  }
  var cols={};
  tasks.forEach(function(t){
    var c=col[t.id];
    if (!cols[c]) cols[c]=[];
    cols[c].push(t);
  });
  var colKeys=Object.keys(cols).map(Number).sort(function(a,b){return a-b;});
  var numCols=colKeys.length+1;
  var wrap=document.getElementById('canvas-wrap');
  var canvasW=wrap.clientWidth||390;
  var canvasH=wrap.clientHeight||500;
  var PAD_X=10, PAD_Y=10, MIN_GAP_X=8, MIN_GAP_Y=8;
  var maxAbove=0, maxBelow=0;
  colKeys.forEach(function(c){
    var nc=cols[c].filter(function(t){return !critSet[t.id];});
    maxAbove=Math.max(maxAbove, Math.ceil(nc.length/2));
    maxBelow=Math.max(maxBelow, Math.floor(nc.length/2));
  });
  var totalRows=1+maxAbove+maxBelow;
  var fitW=(canvasW-2*PAD_X-(numCols-1)*MIN_GAP_X)/numCols;
  var nw=Math.min(NODE_W, Math.max(60, fitW));
  var fitH=(canvasH-2*PAD_Y-(totalRows-1)*MIN_GAP_Y)/Math.max(totalRows,1);
  var nh=Math.min(NODE_H, Math.max(50, fitH));
  var totalUsedW=numCols*nw;
  var colGap=numCols>1 ? Math.max(MIN_GAP_X,(canvasW-2*PAD_X-totalUsedW)/(numCols-1)) : 0;
  var rowStep=nh+Math.max(MIN_GAP_Y,(canvasH-2*PAD_Y-totalRows*nh)/Math.max(totalRows-1,1));
  var colX={};
  colKeys.forEach(function(c,i){ colX[c]=PAD_X+i*(nw+colGap); });
  var finColX=PAD_X+(numCols-1)*(nw+colGap);
  var midY=PAD_Y+maxAbove*rowStep;
  colKeys.forEach(function(c){
    var crits=cols[c].filter(function(t){return critSet[t.id];});
    var noncrits=cols[c].filter(function(t){return !critSet[t.id];});
    crits.forEach(function(t,i){
      t.x=colX[c]+i*(nw+4); t.y=midY; t._nw=nw; t._nh=nh;
    });
    noncrits.forEach(function(t,i){
      var above=(i%2===0);
      var band=Math.floor(i/2)+1;
      t.x=colX[c];
      t.y=above ? midY-band*rowStep : midY+band*rowStep;
      t._nw=nw; t._nh=nh;
    });
  });
  layoutData={nw:nw, nh:nh, finX:finColX, finY:midY};
}

var scale=1, offsetX=0, offsetY=0;
var connectMode=false, connectSource=null;

function arrow(svg, x1,y1,x2,y2, isCrit) {
  var cx=Math.max(20,(x2-x1)*0.4);
  var el=document.createElementNS('http://www.w3.org/2000/svg','path');
  el.setAttribute('class','arrow'+(isCrit?' critical':''));
  el.setAttribute('d','M'+x1+','+y1+' C'+(x1+cx)+','+y1+' '+(x2-cx)+','+y2+' '+x2+','+y2);
  el.setAttribute('marker-end', isCrit?'url(#ahc)':'url(#ah)');
  svg.appendChild(el);
}

function applyTransform() {
  var t='translate('+offsetX+'px,'+offsetY+'px) scale('+scale+')';
  document.getElementById('canvas').style.transform=t;
  document.getElementById('canvas').style.transformOrigin='0 0';
  document.getElementById('arrows').style.transform=t;
  document.getElementById('arrows').style.transformOrigin='0 0';
}

function renderGraph() {
  var res=calcPert();
  var canvas=document.getElementById('canvas');
  var svg=document.getElementById('arrows');
  canvas.innerHTML='';
  svg.querySelectorAll('.arrow').forEach(function(e){e.remove();});
  applyTransform();
  if (!tasks.length) {
    document.getElementById('infoCount').textContent='0';
    document.getElementById('infoDuration').textContent='0';
    document.getElementById('infoCritical').textContent='—';
    return;
  }
  var nw=layoutData.nw||NODE_W, nh=layoutData.nh||NODE_H;
  var finX=layoutData.finX||300, finY=layoutData.finY||100;
  var successorIds={};
  tasks.forEach(function(t){ (t.preds||[]).forEach(function(pid){ successorIds[pid]=true; }); });
  var terminals=tasks.filter(function(t){ return !successorIds[t.id]; });
  var finIsCrit=terminals.some(function(t){return t.critical;});
  tasks.forEach(function(t){
    (t.preds||[]).forEach(function(pid){
      var p=tasks.filter(function(x){return x.id===pid;})[0];
      if (!p) return;
      var isCrit=t.critical&&p.critical;
      var pnw=p._nw||nw, pnh=p._nh||nh, tnh=t._nh||nh;
      arrow(svg, (p.x||0)+pnw,(p.y||0)+pnh/2, (t.x||0),(t.y||0)+tnh/2, isCrit);
    });
  });
  terminals.forEach(function(p){
    var pnw=p._nw||nw, pnh=p._nh||nh;
    var isCrit=p.critical&&finIsCrit;
    arrow(svg, (p.x||0)+pnw,(p.y||0)+pnh/2, finX,finY+nh/2, isCrit);
  });
  tasks.forEach(function(t){
    var tnw=t._nw||nw, tnh=t._nh||nh;
    var fId  =Math.max(7, Math.min(9,  tnw*0.075));
    var fName=Math.max(8, Math.min(12, tnw*0.1));
    var fData=Math.max(7, Math.min(10, tnw*0.083));
    var el=document.createElement('div');
    el.className='node'+(t.critical?' critical':'');
    el.dataset.id=t.id;
    el.style.left =(t.x||0)+'px';
    el.style.top  =(t.y||0)+'px';
    el.style.width =tnw+'px';
    el.style.height=tnh+'px';
    var sc=t.slack===0?'zero':'';
    el.innerHTML='<div class="node-inner">'
      +'<div class="node-id" style="font-size:'+fId+'px">'+t.id+'</div>'
      +'<div class="node-name" style="font-size:'+fName+'px">'+t.name+'</div>'
      +'<div class="node-times" style="font-size:'+fData+'px">'
        +'<span class="node-es">ES:'+t.es+'</span>'
        +' <span class="node-dur">D:'+t.dur+'</span>'
        +' <span class="node-ls">LS:'+(t.ls===Infinity?'?':t.ls)+'</span>'
      +'</div>'
      +'<div class="node-slack '+sc+'" style="font-size:'+fData+'px">marge:'+(t.slack===Infinity?'?':t.slack)+'</div>'
      +'</div>';
    canvas.appendChild(el);
    addNodeInteraction(el, t);
  });
  var fFin=Math.max(10, Math.min(15, nw*0.12));
  var finEl=document.createElement('div');
  finEl.className='node fin-node'+(finIsCrit?' critical':'');
  finEl.style.left  =finX+'px';
  finEl.style.top   =finY+'px';
  finEl.style.width =nw+'px';
  finEl.style.height=nh+'px';
  finEl.style.alignItems='center';
  finEl.style.justifyContent='center';
  finEl.innerHTML='<div style="text-align:center">'
    +'<div style="font-family:Syne,sans-serif;font-size:'+fFin+'px;font-weight:800;'
      +'color:'+(finIsCrit?'var(--critical)':'var(--accent)')+'">FIN</div>'
    +'<div style="font-size:'+(fFin*0.8)+'px;color:var(--accent);margin-top:2px">J'+res.maxEF+'</div>'
    +'</div>';
  canvas.appendChild(finEl);
  document.getElementById('infoCount').textContent=tasks.length;
  document.getElementById('infoDuration').textContent=res.maxEF;
  document.getElementById('infoCritical').textContent=
    res.critTasks.length ? res.critTasks.map(function(t){return t.name;}).join(' > ') : '—';
}

function addNodeInteraction(el, task) {
  el.addEventListener('click', function(){
    if (connectMode) {
      if (!connectSource) {
        connectSource=task.id;
        el.style.outline='2px solid var(--accent)';
      } else if (connectSource!==task.id) {
        if (!task.preds) task.preds=[];
        if (task.preds.indexOf(connectSource)<0) task.preds.push(connectSource);
        saveTasks(); renderGraph();
        connectSource=null;
        document.querySelectorAll('.node').forEach(function(n){n.style.outline='';});
      }
      return;
    }
    openDetailTask(task.id);
  });
  var startTX,startTY,startX,startY,isDragging=false;
  el.addEventListener('touchstart',function(e){
    var t=e.touches[0];
    startTX=t.clientX; startTY=t.clientY;
    startX=task.x||0; startY=task.y||0;
    isDragging=false;
  },{passive:true});
  el.addEventListener('touchmove',function(e){
    e.stopPropagation();
    var t=e.touches[0];
    var dx=(t.clientX-startTX)/scale;
    var dy=(t.clientY-startTY)/scale;
    if (!isDragging&&Math.abs(dx)+Math.abs(dy)>5) isDragging=true;
    if (isDragging) {
      task.x=Math.max(0,startX+dx); task.y=Math.max(0,startY+dy);
      el.style.left=task.x+'px'; el.style.top=task.y+'px';
      renderArrows();
    }
  },{passive:true});
  el.addEventListener('touchend',function(){
    if (isDragging){ saveTasks(); renderGraph(); }
  });
}

function parseDate(s){ var p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function formatDate(d){
  var y=d.getFullYear(), m=d.getMonth()+1, dd=d.getDate();
  return y+'-'+(m<10?'0':'')+m+'-'+(dd<10?'0':'')+dd;
}
function formatDateFR(d){
  var dd=d.getDate(), m=d.getMonth()+1, y=d.getFullYear();
  return (dd<10?'0':'')+dd+'/'+(m<10?'0':'')+m+'/'+y;
}
function isWorkday(d){ var w=d.getDay(); return w>=1&&w<=5; }

// Current project calendar mode: 'all' or 'work'
var calMode = 'all';

// Add n days to date d — respects calMode
function addWorkdays(d, n){
  if(calMode==='all'){
    var r=new Date(d); r.setDate(r.getDate()+n); return r;
  }
  var r=new Date(d); var step=n>=0?1:-1; var remaining=Math.abs(n);
  while(remaining>0){ r.setDate(r.getDate()+step); if(isWorkday(r)) remaining--; }
  return r;
}

// Convert PERT day index to real date from anchor
function pertDayToDate(anchor, pertDay){
  if(pertDay===0) return new Date(anchor);
  return addWorkdays(new Date(anchor), pertDay);
}

// Convert real date to PERT day index from anchor
function dateToPertDay(anchor, date){
  var d=new Date(anchor), count=0, target=new Date(date);
  if(target<=d) return 0;
  while(d<target){ d.setDate(d.getDate()+1); if(isWorkday(d)) count++; }
  return count;
}

// Compute real dates for all tasks given anchor and mode
function computeCalendarDates(proj){
  var anchor = proj.dateAnchor ? parseDate(proj.dateAnchor) : null;
  if(!anchor || !proj.tasks||!proj.tasks.length) return;
  calcPertOn(proj.tasks);
  var maxEF = Math.max.apply(null, proj.tasks.map(function(t){return t.ef;}));

  if(proj.dateMode==='end'){
    // anchor = EXACT end date (even if weekend) — EF of last task = anchor
    // We compute start by going back maxEF workdays from anchor
    // But the last task ends EXACTLY on anchor, not on the next workday
    // Strategy: find what date is "workday 0" such that workday maxEF = anchor
    // i.e. realStart = anchor minus maxEF workdays, but anchor itself is the endpoint
    var realStart = addWorkdays(new Date(anchor), -maxEF);
    proj.tasks.forEach(function(t){
      // ES and EF: go forward from realStart by workdays
      // But last task (ef=maxEF) must land exactly on anchor
      var dateES, dateEF, dateLS, dateLF;
      if(t.ef === maxEF){
        // Last task ends exactly on anchor
        dateEF = new Date(anchor);
        dateES = addWorkdays(new Date(anchor), -(t.dur));
      } else {
        dateES = pertDayToDate(realStart, t.es);
        dateEF = pertDayToDate(realStart, t.ef);
      }
      var ls = t.ls===Infinity?t.es:t.ls;
      var lf = t.lf===Infinity?t.ef:t.lf;
      if(lf === maxEF){
        dateLF = new Date(anchor);
        dateLS = addWorkdays(new Date(anchor), -(t.dur));
      } else {
        dateLS = pertDayToDate(realStart, ls);
        dateLF = pertDayToDate(realStart, lf);
      }
      t.dateES = formatDate(dateES);
      t.dateEF = formatDate(dateEF);
      t.dateLS = formatDate(dateLS);
      t.dateLF = formatDate(dateLF);
    });
    proj._realStart = formatDate(realStart);
    proj._realEnd   = formatDate(anchor);
  } else {
    // anchor = exact start date (ES=0), even if weekend
    proj.tasks.forEach(function(t){
      t.dateES = formatDate(pertDayToDate(anchor, t.es));
      t.dateEF = formatDate(pertDayToDate(anchor, t.ef));
      t.dateLS = formatDate(pertDayToDate(anchor, t.ls===Infinity?t.es:t.ls));
      t.dateLF = formatDate(pertDayToDate(anchor, t.lf===Infinity?t.ef:t.lf));
    });
    proj._realStart = formatDate(anchor);
    proj._realEnd   = formatDate(pertDayToDate(anchor, maxEF));
  }
  proj._anchorIsWeekend = !isWorkday(anchor);
}

// Compute time-based dates (minutes or hours)
function computeTimeDates(proj){
  var anchor = proj.dateAnchor; // HH:MM string
  if(!anchor || !proj.tasks||!proj.tasks.length) return;
  var unit = proj.unit||'day';
  calcPertOn(proj.tasks);
  var maxEF = Math.max.apply(null, proj.tasks.map(function(t){return t.ef;}));
  var anchorMins = timeToMinutes(anchor);
  // Convert EF units to minutes
  var toMins = unit==='min' ? 1 : 60;
  var startMins, endMins;
  if(proj.dateMode==='end'){
    endMins   = anchorMins;
    startMins = anchorMins - maxEF*toMins;
  } else {
    startMins = anchorMins;
    endMins   = anchorMins + maxEF*toMins;
  }
  proj.tasks.forEach(function(t){
    var ls = t.ls===Infinity?t.es:t.ls;
    var lf = t.lf===Infinity?t.ef:t.lf;
    t.dateES = minutesToHHMM(startMins + t.es*toMins);
    t.dateEF = minutesToHHMM(startMins + t.ef*toMins);
    t.dateLS = minutesToHHMM(startMins + ls*toMins);
    t.dateLF = minutesToHHMM(startMins + lf*toMins);
  });
  proj._realStart = minutesToHHMM(startMins);
  proj._realEnd   = minutesToHHMM(endMins);
}

function openProject(id) {
  currentProjId=id;

  if(p.dateAnchor && p.tasks&&p.tasks.length){
    if(pUnit==='min'||pUnit==='hour') computeTimeDates(p);
    else computeCalendarDates(p);
  }
  tasks=JSON.parse(JSON.stringify(p.tasks||[]));
  document.getElementById('headerProjName').textContent=p.name;
  var sub=p.desc||'';
  if(p._realStart&&p._realEnd) sub+=(sub?' · ':'')+formatDateFR(parseDate(p._realStart))+' → '+formatDateFR(parseDate(p._realEnd));
  document.getElementById('headerProjSub').textContent=sub;

  var preds=[];
  document.querySelectorAll('#fPreds .check-pill.selected').forEach(function(el){preds.push(el.dataset.id);});
  if (editingTaskId) {
    var t=tasks.filter(function(x){return x.id===editingTaskId;})[0];
    if (t){ t.name=name; t.dur=dur; t.preds=preds; }
  } else {
    tasks.push({id:genId(),name:name,dur:dur,preds:preds,x:20,y:20});
  }
  autoLayout(); saveTasks();
  // Recompute dates
  var cp=currentProj();
  if(cp && cp.dateAnchor){
    var cpUnit=cp.unit||'day';
    if(cpUnit==='min'||cpUnit==='hour') computeTimeDates(cp);
    else computeCalendarDates(cp);
    tasks=JSON.parse(JSON.stringify(cp.tasks||[]));
  }
  document.getElementById('modalTask').classList.remove('open');
  renderGraph();
  if (document.getElementById('view-tasks').classList.contains('active')) renderTaskList();
  if (document.getElementById('view-stats').classList.contains('active')) renderStats();

    btnS.style.borderColor=''; btnS.style.color='';
  }
  previewSettingsDates();
}

function timeToMinutes(hhmm){
  var p=hhmm.split(':'); return parseInt(p[0])*60+parseInt(p[1]);
}
function minutesToHHMM(mins){
  var h=Math.floor(mins/60), m=mins%60;
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}

function previewSettingsDates(){
  var res = document.getElementById('sDateResult');
  var isTime = (settingsUnit==='min'||settingsUnit==='hour');
  var anchorVal = isTime ? document.getElementById('sTime').value : document.getElementById('sDate').value;
  if(!anchorVal || !tasks.length){ res.style.display='none'; return; }

  var tempTasks = JSON.parse(JSON.stringify(tasks));
  calcPertOn(tempTasks);
  var maxEF = Math.max.apply(null, tempTasks.map(function(t){return t.ef;}));

  if(isTime){
    // Work in minutes
    var anchorMins = timeToMinutes(anchorVal);
    var totalMins = settingsUnit==='min' ? maxEF : maxEF*60;
    var startMins, endMins;
    if(settingsMode==='end'){ endMins=anchorMins; startMins=anchorMins-totalMins; }
    else { startMins=anchorMins; endMins=anchorMins+totalMins; }
    res.style.display='block';
    res.innerHTML = '🕐 Début : <b style="color:var(--accent)">'+minutesToHHMM(startMins)+'</b><br>'
      +'🏁 Fin : <b style="color:var(--accent)">'+minutesToHHMM(endMins)+'</b><br>'
      +'⏱ Durée totale : <b style="color:var(--accent)">'+totalMins+' min ('+(totalMins/60).toFixed(1)+'h)</b>';
  } else {
    var anchor = parseDate(anchorVal);
    var startDate, endDate;
    if(settingsMode==='end'){ endDate=anchor; startDate=addWorkdays(new Date(anchor),-maxEF); }
    else { startDate=anchor; endDate=addWorkdays(new Date(anchor),maxEF); }
    var isWE = !isWorkday(anchor);
    var calLabel = (settingsCal==='all') ? 'jours calendaires' : 'jours ouvrés';
    res.style.display='block';
    res.innerHTML = '📅 Début : <b style="color:var(--accent)">'+formatDateFR(startDate)+'</b><br>'
      +'🏁 Fin : <b style="color:var(--accent)">'+formatDateFR(endDate)+'</b><br>'
      +'⏱ Durée : <b style="color:var(--accent)">'+maxEF+' '+calLabel+'</b>'
      +(isWE && settingsCal==='work' ? '<br>⚠️ <b style="color:var(--accent2)">Week-end — durées en jours ouvrés, date fixe.</b>' : '')
      +(isWE && settingsCal==='all'  ? '<br>ℹ️ Week-end pris en compte normalement.' : '');
  }
}

document.querySelectorAll('.tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
    document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
    tab.classList.add('active');
    var v=tab.dataset.view;
    document.getElementById('view-'+v).classList.add('active');
    if (v==='graph') renderGraph();
    if (v==='tasks') renderTaskList();
    if (v==='stats') renderStats();
  });
});
